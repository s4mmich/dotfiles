[bar]
scale = 0.75
bg = "bg-base"
background-opacity = 80
button-variant = "icon-square"
button-bg-opacity = 0

[[bar.layout]]
monitor = "DP-1"
show = true
left = [
    "dashboard",
    "hyprland-workspaces",
    "media",
]
center = ["cava"]
right = [
    "volume",
    "clock",
]

[[bar.layout]]
monitor = "HDMI-A-1"
show = true
left = [
    "idle-inhibit",
    "weather",
    "updates",
]
center = [
    "cpu",
    "ram",
]
right = [
    "systray",
    "notifications",
    "clock",
]

[styling.palette]
primary = "#f6a6bb"

[modules.cava]
bars = 210
framerate = 24
noise-reduction = 0.2345679012345679

[modules.clock]
format = "%H:%M"

[modules.dashboard]
border-color = "accent"
icon-bg-color = "accent"

[modules.hyprland-workspaces]
app-icons-show = true

[modules.media]
border-show = true
border-color = "accent"
icon-bg-color = "accent"
label-color = "accent"

[modules.volume]
border-color = "accent"
icon-bg-color = "accent"
label-color = "accent"

[modules.weather]
location = "Hanover"

[osd]
monitor = "DP-1"

[wallpaper]
engine-enabled = false
